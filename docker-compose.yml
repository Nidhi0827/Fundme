services:

  mysql:
    image: mysql:8.0
    container_name: fundme-mysql
    environment:
      MYSQL_ROOT_PASSWORD: India@0827$
      MYSQL_DATABASE: fundme_db
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - fundme-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pIndia@0827$"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: fundme-app
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/fundme_db
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: India@0827$
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - fundme-network

volumes:
  mysql_data:

networks:
  fundme-network:
    driver: bridge